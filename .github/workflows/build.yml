build-asahi:
  runs-on: ubuntu-latest
  needs: build-jadeite
  permissions:
    contents: read
    packages: write
  steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push jadeite-asahi
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./containerfile-asahi
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.IMAGE_REGISTRY }}/jadeite-asahi:latest
          ${{ env.IMAGE_REGISTRY }}/jadeite-asahi:${{ github.sha }}
